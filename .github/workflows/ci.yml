name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  # Manual trigger from the Actions tab. Useful for verifying the workflow
  # actually runs after enabling Actions at org level — push events take a
  # human commit to test, dispatch needs only a button click.
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend linting with Ruff
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --dev
      - name: Ruff lint check
        run: uv run ruff check .
        continue-on-error: true  # Pre-existing warnings in broker modules
      - name: Ruff format check
        run: uv run ruff format --check .
        continue-on-error: true  # Pre-existing formatting in broker modules

  # Backend tests (CI-safe subset - no broker credentials needed)
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync
      - name: Run CI-safe tests
        run: |
          uv run pytest test/test_log_location.py test/test_navigation_update.py \
            test/test_python_editor.py test/test_rate_limits_simple.py \
            test/test_logout_csrf.py -v --timeout=60

  # Frontend linting
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  # Frontend build (includes TypeScript check)
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # Frontend unit tests
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:run
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7

  # Frontend E2E tests (Chromium only for speed)
  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e -- --project=chromium
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --dev
      - name: Bandit security scan
        run: uv run bandit -r . -x .venv,test,frontend,node_modules -ll -f txt
        continue-on-error: true
      - name: pip-audit vulnerability scan
        run: uv run pip-audit
        continue-on-error: true

  # Auto-commit built frontend dist (main branch only)
  commit-dist:
    runs-on: ubuntu-latest
    needs: [frontend-build, frontend-lint, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Commit and push dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f frontend/dist/
          git diff --staged --quiet || git commit -m "chore: auto-build frontend dist [skip ci]"
          git push

  # Docker build, scan, and push to GitHub Container Registry (GHCR).
  #
  # alphago_live fork (2026-05-19): switched publish target from Docker
  # Hub (sudhan/openalgo) to GHCR (ghcr.io/alpha112233/alphago_live). The
  # existing subscriber container `openalgo-demo` on tidi already pulls
  # from this GHCR namespace; .env.template will point all new and
  # migrated subscribers at the same image. Uses the auto-provided
  # GITHUB_TOKEN — no manual repo secrets to maintain.
  #
  # Multi-arch (issue #1205): builds linux/amd64 and linux/arm64 natively
  # on per-arch GitHub runners (ubuntu-latest / ubuntu-24.04-arm). No
  # QEMU emulation — each matrix leg runs on its own native arch. This
  # is essential because the image now installs chromium for Kaleido /
  # Plotly chart rendering, and chromium's apt post-install scripts are
  # painfully slow under QEMU (15-25 min vs ~2 min native).
  #
  # On PRs: each leg builds with `load: true` and runs the Kaleido smoke
  # test against the locally-loaded image of its own arch. No push.
  #
  # On main push / v* tag push: each leg builds and pushes by digest (no
  # tag assigned), then the docker-manifest job downloads all per-arch
  # digests and assembles them into a single GHCR manifest list under
  # the canonical tags (:latest on main, :<sha>, and :v<semver> on tag).
  docker-build:
    needs: [backend-lint, backend-test, frontend-build, security-scan]
    # PRs from forks can't write to GHCR with GITHUB_TOKEN — skip there.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-arch metadata — labels only. Final tags are assigned by the
      # docker-manifest merge job, not here.
      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      # PR path: build single-arch and load into the runner's local Docker
      # daemon for the smoke test. No push.
      - name: Build (PR load)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: openalgo-ci:${{ matrix.suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

      # Push path: build per-arch and push by digest. The manifest job
      # downstream assembles the per-arch digests into the final
      # multi-arch tags. Runs on main push AND on v* tag push.
      - name: Build (push by digest)
        if: github.event_name == 'push'
        id: build-main
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

      # Kaleido + Chromium smoke test, run natively on each matrix leg.
      # Renders a trivial Plotly figure to PNG inside the just-built image
      # to verify chromium + kaleido + plotly are wired up end to end. Now
      # runs on both amd64 and arm64, so arch-specific regressions (e.g.
      # missing arm64 Chromium libs, wheel compatibility issues) surface
      # in CI rather than in production.
      #
      # Does NOT catch the asyncio/eventlet nesting regression — that one
      # only manifests when called from inside a live PTB event loop, and
      # plain `python -c` has no running loop. See
      # docs/telegram-chart-rendering.md for the full write-up.
      - name: Kaleido + Chromium smoke test
        if: github.event_name == 'pull_request'
        run: |
          SUFFIX="${{ matrix.suffix }}"
          echo "[smoke] Testing openalgo-ci:$SUFFIX"
          docker run --rm --entrypoint /app/.venv/bin/python "openalgo-ci:$SUFFIX" -c '
          import plotly.graph_objects as go
          img = go.Figure(data=[go.Candlestick(
              x=[1, 2], open=[100, 102], high=[105, 106],
              low=[99, 101], close=[104, 103]
          )]).to_image(format="png", engine="kaleido")
          assert len(img) > 1000, f"unexpected PNG size: {len(img)}"
          print(f"Kaleido smoke test OK: {len(img)} bytes")
          '
          echo "[smoke] $SUFFIX OK"

      # Export the per-arch digest so the docker-manifest job can pick it
      # up and assemble the final manifest list.
      - name: Export digest
        if: github.event_name == 'push'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-main.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests into a single GHCR manifest list
  # (linux/amd64 + linux/arm64). Tag policy:
  #   :latest    — only on main push (NOT on v* tag push, to avoid races)
  #   :<sha>     — every push, both main and tag
  #   :v<ver>    — only on v* tag push (matches GitHub release tag)
  #   :<ver-mm>  — major.minor convenience tag (e.g. v1.2.3 → :1.2)
  # Subscribers pin to :v<ver> in their per-client .env so a bad merge
  # to main never auto-deploys (they only get the new version after a
  # tag is cut and `manage.py update-all --version v<ver>` runs).
  docker-manifest:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create multi-arch manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect assembled image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          format: 'table'
